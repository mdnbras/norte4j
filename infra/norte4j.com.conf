<VirtualHost *:80>
        ServerAdmin marcelodaniel.daniel@gmail.com
        ServerName norte4j.com
        ServerAlias norte4j.com
        ProxyRequests Off
        ProxyPreserveHost On
        ProxyVia On
        <Proxy *>
                Require all granted
        </Proxy>
        <Location />
                ProxyPass http://127.0.0.1:3007/
                ProxyPassReverse http://127.0.0.1:3007/
        </Location>
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
